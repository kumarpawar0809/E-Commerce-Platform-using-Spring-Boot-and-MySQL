<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce</title>

    <style>
        body {
            font-family: Arial;
            background-color: #eaeded;
            margin: 0;
        }

        /* 🔍 Search Bar */
        .search-bar {
            display: flex;
            justify-content: center;
            background: #131921;
            padding: 12px;
        }

        .search-bar input {
            width: 40%;
            padding: 10px;
            border: none;
        }

        .search-bar button {
            padding: 10px;
            background: orange;
            border: none;
            cursor: pointer;
        }

        /* Layout */
        .container {
            display: flex;
            padding: 20px;
        }

        /* Filters */
        .filters {
            width: 250px;
            background: white;
            padding: 15px;
            border-radius: 10px;
        }

        .filters input, .filters select {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
        }

        .filters button {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        /* Products */
        .products {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-left: 20px;
        }

        .card {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 0 5px gray;
        }

        .price {
            color: red;
            font-weight: bold;
        }
    </style>

</head>
<body>

<!-- 🔍 Search -->
<div class="search-bar">
    <input type="text" id="searchName" placeholder="Search product...">
    <button onclick="searchProduct()">Search</button>
</div>

<div class="container">

    <!-- 🔹 Filters -->
    <div class="filters">
        <h3>Filters</h3>

        <input type="text" id="category" placeholder="Category">

        <input type="number" id="minPrice" placeholder="Min Price">
        <input type="number" id="maxPrice" placeholder="Max Price">

        <select id="sort">
            <option value="">Sort</option>
            <option value="desc">Price High → Low</option>
        </select>

        <button onclick="applyFilters()">Apply</button>
        <button onclick="loadProducts()">Reset</button>
    </div>

    <!-- 🔹 Products -->
    <div class="products" id="productList"></div>

</div>

<script>

const BASE_URL = "http://localhost:8080/product";

// Load all
function loadProducts() {
    fetch(BASE_URL)
        .then(res => res.json())
        .then(data => displayProducts(data));
}

// 🔍 Search
function searchProduct() {
    let name = document.getElementById("searchName").value;

    fetch(`${BASE_URL}/search/${name}`)
        .then(res => res.json())
        .then(data => displayProducts(data));
}

// 🎯 Filters
function applyFilters() {

    let category = document.getElementById("category").value;
    let min = document.getElementById("minPrice").value;
    let max = document.getElementById("maxPrice").value;
    let sort = document.getElementById("sort").value;

    // Priority logic (based on your backend APIs)

    if (category) {
        fetch(`${BASE_URL}/category/${category}`)
            .then(res => res.json())
            .then(data => displayProducts(data));
    }

    else if (min && max) {
        fetch(`${BASE_URL}/price-range/${min}/${max}`)
            .then(res => res.json())
            .then(data => displayProducts(data));
    }

    else if (sort === "desc") {
        fetch(`${BASE_URL}/sort-price-desc`)
            .then(res => res.json())
            .then(data => displayProducts(data));
    }

    else {
        loadProducts();
    }
}

// 🧾 Display
function displayProducts(products) {
    let container = document.getElementById("productList");
    container.innerHTML = "";

    if (products.length === 0) {
        container.innerHTML = "<h3>No Products Found</h3>";
        return;
    }

    products.forEach(p => {
        container.innerHTML += `
            <div class="card">
                <h4>${p.name}</h4>
                <p class="price">₹${p.price}</p>
                <p>Category: ${p.category?.name}</p>
            </div>
        `;
    });
}

// Load initially
loadProducts();

</script>

</body>
</html>
